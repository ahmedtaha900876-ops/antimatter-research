<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>محاكاة المادة مع المادة المضادة</title>
  <style>
    html, body {
      margin: 0;
      height: 100%;
      overflow: hidden;
      background: radial-gradient(circle at center, #040710 0%, #000000 65%);
      font-family: Tahoma, Arial, sans-serif;
      color: #fff;
    }
    canvas {
      display: block;
      width: 100vw;
      height: 100vh;
      background: transparent;
    }
    .overlay {
      position: fixed;
      top: 16px;
      right: 16px;
      padding: 12px 14px;
      background: rgba(0,0,0,0.55);
      border: 1px solid rgba(255,255,255,0.14);
      border-radius: 12px;
      backdrop-filter: blur(8px);
      max-width: 320px;
      box-shadow: 0 0 25px rgba(0,0,0,0.35);
      line-height: 1.5;
      font-size: 14px;
    }
    .overlay h1 {
      margin: 0 0 8px;
      font-size: 18px;
    }
    .legend { margin-top: 8px; display: flex; gap: 10px; flex-wrap: wrap; }
    .chip { display: inline-flex; align-items: center; gap: 6px; font-size: 12px; }
    .dot { width: 10px; height: 10px; border-radius: 50%; display: inline-block; }
  </style>
</head>
<body>
  <canvas id="sim"></canvas>
  <div class="overlay">
    <h1>انحلال المادة والمادة المضادة</h1>
    <div>تتحرك الجسيمات من الجانبين نحو المركز، وعند التقاء المادة مع المادة المضادة يحدث انفجار طاقة شديد ثم موجة إشعاعية تتوسع.</div>
    <div class="legend">
      <span class="chip"><span class="dot" style="background:#38bdf8"></span>مادة</span>
      <span class="chip"><span class="dot" style="background:#ff6b3d"></span>مادة مضادة</span>
      <span class="chip"><span class="dot" style="background:#ffe066"></span>طاقة إشعاعية</span>
    </div>
  </div>
  <script>
    const canvas = document.getElementById('sim');
    const ctx = canvas.getContext('2d');

    let w = 0, h = 0;
    const particles = [];
    const radiation = [];
    let eventState = 0;
    let flash = 0;

    function resize() {
      w = canvas.width = window.innerWidth;
      h = canvas.height = window.innerHeight;
      initScene();
    }

    function initScene() {
      particles.length = 0;
      radiation.length = 0;
      eventState = 0;
      flash = 0;

      const count = Math.min(220, Math.floor(w / 4));
      for (let i = 0; i < count; i++) {
        const x = -30 + Math.random() * (w * 0.4);
        const y = Math.random() * h;
        particles.push({
          x,
          y,
          vx: 1.4 + Math.random() * 0.9,
          vy: (Math.random() - 0.5) * 0.4,
          life: 1,
          kind: 'matter',
          size: 1.4 + Math.random() * 1.2,
          trail: []
        });
      }

      for (let i = 0; i < count; i++) {
        const x = w + 30 - Math.random() * (w * 0.4);
        const y = Math.random() * h;
        particles.push({
          x,
          y,
          vx: -(1.4 + Math.random() * 0.9),
          vy: (Math.random() - 0.5) * 0.4,
          life: 1,
          kind: 'antimatter',
          size: 1.4 + Math.random() * 1.2,
          trail: []
        });
      }
    }

    function createEvent(x, y) {
      eventState = 1;
      flash = 1.0;
      for (let i = 0; i < 140; i++) {
        const angle = (Math.PI * 2 * i) / 140;
        const speed = 1.8 + Math.random() * 2.8;
        radiation.push({
          x,
          y,
          vx: Math.cos(angle) * speed,
          vy: Math.sin(angle) * speed,
          life: 1.0,
          size: 1 + Math.random() * 2.2,
          hue: 36 + Math.random() * 20,
          alpha: 0.9
        });
      }
    }

    function drawBackground() {
      const g = ctx.createLinearGradient(0, 0, 0, h);
      g.addColorStop(0, '#050814');
      g.addColorStop(0.5, '#02030a');
      g.addColorStop(1, '#000000');
      ctx.fillStyle = g;
      ctx.fillRect(0, 0, w, h);

      ctx.save();
      for (let i = 0; i < 6; i++) {
        ctx.strokeStyle = `rgba(255,255,255,${0.03 + i * 0.005})`;
        ctx.lineWidth = 1;
        ctx.beginPath();
        ctx.moveTo(0, h * (0.15 + i * 0.12));
        ctx.quadraticCurveTo(w * 0.5, h * (0.05 + i * 0.04), w, h * (0.15 + i * 0.12));
        ctx.stroke();
      }
      ctx.restore();
    }

    function update(dt) {
      if (eventState === 0) {
        const centerX = w * 0.5;
        const centerY = h * 0.5;
        let close = false;

        for (const p of particles) {
          p.x += p.vx * dt * 60;
          p.y += p.vy * dt * 60;

          if (p.trail.length > 8) p.trail.shift();
          p.trail.push({ x: p.x, y: p.y });

          const dist = Math.hypot(p.x - centerX, p.y - centerY);
          if (dist < 90) {
            close = true;
          }
        }

        if (close) {
          const matter = particles.filter(p => p.kind === 'matter');
          const antimatter = particles.filter(p => p.kind === 'antimatter');
          if (matter.length > 0 && antimatter.length > 0) {
            createEvent(centerX, centerY);
            for (const p of particles) {
              p.vx *= 0.15;
              p.vy *= 0.15;
            }
          }
        }
      }

      if (eventState === 1) {
        flash *= 0.92;
        for (const r of radiation) {
          r.x += r.vx * dt * 45;
          r.y += r.vy * dt * 45;
          r.life -= 0.012 * dt * 60;
          r.size *= 1.008;
          r.alpha *= 0.985;
        }
        radiation.splice(0, radiation.length - 320);
        if (flash < 0.03 && radiation.every(r => r.life <= 0)) {
          eventState = 2;
        }
      }

      if (eventState === 2) {
        for (const p of particles) {
          p.x += p.vx * dt * 30;
          p.y += p.vy * dt * 30;
          if (p.x < -100 || p.x > w + 100 || p.y < -100 || p.y > h + 100) {
            p.x = Math.random() * w;
            p.y = Math.random() * h;
            p.vx = (Math.random() < 0.5 ? -1 : 1) * (1.2 + Math.random() * 1.2);
            p.vy = (Math.random() - 0.5) * 1.0;
          }
        }
        if (Math.random() < 0.008) {
          eventState = 0;
          initScene();
        }
      }
    }

    function draw() {
      drawBackground();

      const centerX = w * 0.5;
      const centerY = h * 0.5;

      if (eventState === 1 || eventState === 2) {
        const pulse = 55 + flash * 120;
        ctx.beginPath();
        ctx.arc(centerX, centerY, pulse * (0.6 + flash * 0.8), 0, Math.PI * 2);
        ctx.strokeStyle = `rgba(255, 240, 170, ${0.12 + flash * 0.2})`;
        ctx.lineWidth = 2 + flash * 6;
        ctx.stroke();

        const glow = ctx.createRadialGradient(centerX, centerY, 0, centerX, centerY, 180 + flash * 220);
        glow.addColorStop(0, `rgba(255, 210, 90, ${0.22 + flash * 0.35})`);
        glow.addColorStop(0.35, `rgba(255, 120, 60, ${0.12 + flash * 0.12})`);
        glow.addColorStop(1, 'rgba(255, 120, 60, 0)');
        ctx.fillStyle = glow;
        ctx.fillRect(0, 0, w, h);
      }

      for (const p of particles) {
        if (p.trail.length > 1) {
          ctx.beginPath();
          for (let i = 0; i < p.trail.length; i++) {
            const t = p.trail[i];
            if (i === 0) ctx.moveTo(t.x, t.y);
            else ctx.lineTo(t.x, t.y);
          }
          ctx.strokeStyle = p.kind === 'matter' ? 'rgba(56,189,248,0.16)' : 'rgba(255,107,61,0.16)';
          ctx.lineWidth = 1;
          ctx.stroke();
        }

        ctx.beginPath();
        ctx.arc(p.x, p.y, p.size, 0, Math.PI * 2);
        ctx.fillStyle = p.kind === 'matter' ? '#38bdf8' : '#ff6b3d';
        ctx.shadowBlur = 10;
        ctx.shadowColor = p.kind === 'matter' ? '#38bdf8' : '#ff6b3d';
        ctx.fill();
        ctx.shadowBlur = 0;
      }

      for (const r of radiation) {
        ctx.beginPath();
        ctx.arc(r.x, r.y, r.size, 0, Math.PI * 2);
        ctx.fillStyle = `hsla(${r.hue}, 100%, 70%, ${r.alpha})`;
        ctx.fill();
      }

      ctx.save();
      ctx.globalAlpha = 0.35;
      ctx.strokeStyle = '#ffffff';
      ctx.lineWidth = 1;
      ctx.beginPath();
      ctx.moveTo(w * 0.2, h * 0.48);
      ctx.lineTo(w * 0.8, h * 0.48);
      ctx.stroke();
      ctx.restore();
    }

    let last = performance.now();
    function loop(now) {
      const dt = Math.min(1.5, (now - last) / 1000);
      last = now;
      update(dt);
      draw();
      requestAnimationFrame(loop);
    }

    window.addEventListener('resize', resize);
    resize();
    requestAnimationFrame(loop);
  </script>
</body>
</html>
