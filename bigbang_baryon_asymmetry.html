<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>الانفجار العظيم - عدم التماثل البايروني</title>
  <style>
    html, body {
      margin: 0;
      width: 100%;
      height: 100%;
      overflow: hidden;
      background: #000;
      font-family: Tahoma, Arial, sans-serif;
      color: white;
    }
    canvas { display:block; width:100vw; height:100vh; }
    .overlay {
      position: fixed;
      top: 16px;
      right: 16px;
      max-width: 360px;
      padding: 14px 16px;
      background: rgba(0,0,0,0.6);
      border: 1px solid rgba(255,255,255,0.16);
      border-radius: 14px;
      backdrop-filter: blur(10px);
      box-shadow: 0 0 30px rgba(0,0,0,0.4);
      line-height: 1.6;
      font-size: 14px;
    }
    .overlay h1 { margin: 0 0 8px; font-size: 18px; }
    .badge {
      display: inline-block;
      margin-top: 8px;
      padding: 6px 10px;
      border-radius: 999px;
      background: linear-gradient(90deg, #ff8a00, #ff3d71);
      color: white;
      font-weight: 700;
      font-size: 12px;
      letter-spacing: 0.4px;
    }
  </style>
</head>
<body>
  <canvas id="scene"></canvas>
  <div class="overlay">
    <h1>الانفجار العظيم</h1>
    <div>مشهد بصري شبه واقعي يبرز فكرة عدم التماثل البايروني، حيث يهيمن اتجاه معين للطاقة والمادة بعد الانفجار.</div>
    <div class="badge">عدم التماثل البايروني</div>
  </div>

  <script>
    const canvas = document.getElementById('scene');
    const ctx = canvas.getContext('2d');

    let w = 0, h = 0;
    const stars = [];
    const debris = [];
    const rings = [];
    const bias = { x: 0.16, y: -0.05 };
    let time = 0;

    function resize() {
      w = canvas.width = window.innerWidth;
      h = canvas.height = window.innerHeight;
      initScene();
    }

    function initScene() {
      stars.length = 0;
      debris.length = 0;
      rings.length = 0;
      time = 0;

      for (let i = 0; i < 300; i++) {
        stars.push({
          x: Math.random() * w,
          y: Math.random() * h,
          r: Math.random() * 1.3 + 0.2,
          a: Math.random() * 0.8 + 0.2,
          twinkle: Math.random() * 6.28
        });
      }

      for (let i = 0; i < 700; i++) {
        const angle = (Math.PI * 2 * i) / 700 + (Math.random() - 0.5) * 0.22;
        const speed = 1.4 + Math.random() * 3.0;
        const b = 0.08 + Math.random() * 0.12;
        debris.push({
          x: w * 0.5,
          y: h * 0.5,
          vx: Math.cos(angle) * speed + bias.x * (1 + Math.random() * 0.8),
          vy: Math.sin(angle) * speed + bias.y * (1 + Math.random() * 0.6),
          life: 1.0,
          size: 1.2 + Math.random() * 1.8,
          hue: 20 + Math.random() * 120,
          alpha: 0.85,
          drift: b,
          kind: Math.random() < 0.7 ? 'plasma' : 'matter'
        });
      }

      rings.push({ radius: 8, alpha: 0.9, width: 3 });
    }

    function drawBackground() {
      const g = ctx.createRadialGradient(w * 0.5, h * 0.5, 5, w * 0.5, h * 0.5, Math.max(w, h) * 0.7);
      g.addColorStop(0, '#0a1028');
      g.addColorStop(0.25, '#050816');
      g.addColorStop(0.65, '#02030a');
      g.addColorStop(1, '#000000');
      ctx.fillStyle = g;
      ctx.fillRect(0, 0, w, h);

      for (const s of stars) {
        const pulse = 0.4 + 0.6 * Math.sin(time * 0.8 + s.twinkle);
        ctx.beginPath();
        ctx.arc(s.x, s.y, s.r * (0.7 + pulse * 0.5), 0, Math.PI * 2);
        ctx.fillStyle = `rgba(255,255,255,${s.a * pulse})`;
        ctx.fill();
      }
    }

    function update(dt) {
      time += dt;

      for (const d of debris) {
        d.x += d.vx * dt * 90;
        d.y += d.vy * dt * 90;
        d.vx *= 0.999;
        d.vy *= 0.999;
        d.life -= dt * 0.04;
        d.alpha *= 0.997;
        d.size *= 1.0012;
        d.vx += bias.x * 0.0015;
        d.vy += bias.y * 0.001;
      }

      for (let i = debris.length - 1; i >= 0; i--) {
        if (debris[i].life <= 0 || Math.hypot(debris[i].x - w * 0.5, debris[i].y - h * 0.5) > Math.max(w, h) * 0.75) {
          debris.splice(i, 1);
        }
      }

      if (rings.length < 20) {
        rings.push({ radius: 10, alpha: 0.9, width: 3 });
      }

      for (const ring of rings) {
        ring.radius += dt * 95;
        ring.alpha *= 0.985;
        ring.width += dt * 0.02;
      }

      while (rings.length > 26) rings.shift();
    }

    function draw() {
      drawBackground();

      const cx = w * 0.5;
      const cy = h * 0.5;

      const halo = ctx.createRadialGradient(cx, cy, 0, cx, cy, 250);
      halo.addColorStop(0, 'rgba(255, 220, 140, 0.35)');
      halo.addColorStop(0.25, 'rgba(255, 120, 60, 0.22)');
      halo.addColorStop(1, 'rgba(255, 80, 40, 0)');
      ctx.fillStyle = halo;
      ctx.fillRect(0, 0, w, h);

      const flash = 0.6 + 0.4 * Math.sin(time * 2.6);
      ctx.beginPath();
      ctx.arc(cx, cy, 18 + flash * 8, 0, Math.PI * 2);
      ctx.fillStyle = `rgba(255,240,180,${0.7 + flash * 0.2})`;
      ctx.fill();

      for (const ring of rings) {
        ctx.beginPath();
        ctx.arc(cx, cy, ring.radius, 0, Math.PI * 2);
        ctx.strokeStyle = `rgba(255, 190, 90, ${ring.alpha * 0.5})`;
        ctx.lineWidth = ring.width;
        ctx.stroke();
      }

      for (const d of debris) {
        ctx.beginPath();
        ctx.arc(d.x, d.y, d.size, 0, Math.PI * 2);
        if (d.kind === 'plasma') {
          ctx.fillStyle = `hsla(${d.hue}, 100%, 70%, ${d.alpha})`;
        } else {
          ctx.fillStyle = `rgba(140, 220, 255, ${d.alpha * 0.75})`;
        }
        ctx.fill();
      }

      ctx.save();
      ctx.globalAlpha = 0.25;
      ctx.strokeStyle = '#ffffff';
      ctx.lineWidth = 1;
      ctx.beginPath();
      ctx.moveTo(cx - 160, cy + 10);
      ctx.quadraticCurveTo(cx + 20, cy - 140, cx + 220, cy + 70);
      ctx.stroke();
      ctx.restore();
    }

    let last = performance.now();
    function loop(now) {
      const dt = Math.min(0.03, (now - last) / 1000);
      last = now;
      update(dt);
      draw();
      requestAnimationFrame(loop);
    }

    window.addEventListener('resize', resize);
    resize();
    requestAnimationFrame(loop);
  </script>
</body>
</html>
